# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false
org.gradle.configuration-cache=false

# Fix for jlink error: Keep auto-detection enabled, but only use locally available JDKs
# and include JAVA_HOME so Gradle prefers the configured JDK over extension-bundled runtimes.
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=false
org.gradle.java.installations.include-java-home=true
