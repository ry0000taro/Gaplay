# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false
org.gradle.configuration-cache=false

# Fix for jlink error: Disable auto-detection of potentially broken local JDKs
# This prevents Gradle from picking up the JRE from the VS Code / .antigravity extension path.
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.include-java-home=false
